<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- background -->
  <rect width="128" height="128" rx="28" fill="#FAF6EC"/>
  <rect x="12" y="12" width="104" height="104" rx="20" fill="#FFFDF7" stroke="#E2D9C3" stroke-width="2"/>

  <!-- chubby rising trend line -->
  <path d="M 28 92 L 48 70 L 64 80 L 84 50"
        fill="none" stroke="#5C6B47" stroke-width="15"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- chubby rounded arrowhead (simple polygon, rounded via stroke-linejoin) -->
  <polygon points="70,34 102,38 90,66"
           fill="#5C6B47" stroke="#5C6B47" stroke-width="10" stroke-linejoin="round"/>

  <!-- cat, bottom right, sitting -->
  <g transform="translate(76,78)">
    <!-- tail -->
    <path d="M 30 14 C 40 12, 44 2, 38 -4"
          fill="none" stroke="#B5652E" stroke-width="5" stroke-linecap="round"/>
    <!-- body -->
    <ellipse cx="16" cy="16" rx="15" ry="12" fill="#D9A464"/>
    <!-- head -->
    <circle cx="10" cy="0" r="11" fill="#D9A464"/>
    <!-- ears -->
    <path d="M 1 -7 L -2 -16 L 6 -10 Z" fill="#D9A464"/>
    <path d="M 19 -7 L 22 -16 L 14 -10 Z" fill="#D9A464"/>
    <!-- face details -->
    <circle cx="6" cy="-1" r="1.4" fill="#3A2E20"/>
    <circle cx="14" cy="-1" r="1.4" fill="#3A2E20"/>
    <path d="M 8 3 Q 10 5 12 3" fill="none" stroke="#3A2E20" stroke-width="1.2" stroke-linecap="round"/>
    <!-- blush -->
    <circle cx="4" cy="2" r="1.6" fill="#E8A9A0" opacity="0.7"/>
    <circle cx="16" cy="2" r="1.6" fill="#E8A9A0" opacity="0.7"/>
  </g>
</svg>
