const WORKER_URL = 'https://yahoo-proxy.yalene-chen.workers.dev';

async function fetchYahooQuotes(symbols) {
  if (!WORKER_URL || WORKER_URL === 'YOUR_CLOUDFLARE_WORKER_URL_HERE') return null;
  if (!symbols.length) return null;
  try {
    const url = `${WORKER_URL}?symbols=${encodeURIComponent(symbols.join(','))}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const results = data?.quoteResponse?.result;
    if (!Array.isArray(results)) return null;
    // Map by symbol for easy lookup by the caller.
    const bySymbol = {};
    for (const r of results) bySymbol[r.symbol] = r;
    return bySymbol;
  } catch (err) {
    console.error('Yahoo quote fetch failed', err);
    return null;
  }
}

function extractLiveFields(q) {
  if (!q || q.error) return null;
  return {
    price: q.regularMarketPrice ?? null,
    change: q.regularMarketChange ?? null,
    changePct: q.regularMarketChangePercent ?? null,
  };
}

// Fetch REAL historical OHLC candles for one symbol (weekly or daily).
// Returns an array of { d, o, h, l, c } or null on failure.
async function fetchYahooHistory(symbol, range, interval) {
  if (!WORKER_URL || WORKER_URL === 'YOUR_CLOUDFLARE_WORKER_URL_HERE') return null;
  try {
    const url = `${WORKER_URL}?symbols=${encodeURIComponent(symbol)}&range=${range}&interval=${interval}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const result = data?.chart?.result?.[0];
    if (!result) return null;
    const timestamps = result.timestamp || [];
    const quote = result.indicators?.quote?.[0] || {};
    const { open = [], high = [], low = [], close = [] } = quote;
    const points = [];
    for (let i = 0; i < timestamps.length; i++) {
      if (open[i] == null || high[i] == null || low[i] == null || close[i] == null) continue;
      const date = new Date(timestamps[i] * 1000);
      const label = `${date.getMonth() + 1}/${date.getDate()}`;
      points.push({
        d: label,
        o: Number(open[i].toFixed(2)),
        h: Number(high[i].toFixed(2)),
        l: Number(low[i].toFixed(2)),
        c: Number(close[i].toFixed(2)),
      });
    }
    return points.length ? points : null;
  } catch (err) {
    console.error('Yahoo history fetch failed for', symbol, err);
    return null;
  }
}

function computePE(price, eps) {
  if (price == null || eps == null || eps === 0) return null;
  return Number((price / eps).toFixed(2));
}

// Fed-model style target price: implied fair P/E = 1 / fed funds rate,
// multiplied by this year's forward EPS estimate.
function computeTargetPrice(epsForward, fedRateEffectivePct) {
  if (epsForward == null || !fedRateEffectivePct) return null;
  const impliedPE = 100 / fedRateEffectivePct;
  return Number((impliedPE * epsForward).toFixed(2));
}

function timeAgoTone(iso) {
  const hrs = (Date.now() - new Date(iso).getTime()) / 36e5;
  if (hrs < 6) return { label: 'fresh', color: '#0F9D58' };
  if (hrs < 24) return { label: 'aging', color: '#D89430' };
  return { label: 'stale', color: '#E0483F' };
}

function fmtTimeAgo(iso) {
  const hrs = Math.floor((Date.now() - new Date(iso).getTime()) / 36e5);
  if (hrs < 1) return 'just now';
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

// EPS is only expected to change roughly quarterly, so its freshness is
// judged in days against a ~90-day cadence rather than the hours-based
// scale used for live price data.
function epsAgeTone(dateStr) {
  if (!dateStr) return { color: '#8A7A5C', days: null };
  const days = Math.floor((Date.now() - new Date(dateStr).getTime()) / 864e5);
  if (days < 75) return { color: '#0F9D58', days };
  if (days < 100) return { color: '#D89430', days };
  return { color: '#E0483F', days };
}

// Custom candlestick renderer. recharts gives each Bar shape its own
// pixel y/height for the bar's dataKey ("range"), where range = [low, high].
// We map open/close/high/low into that same pixel space using the ratio
// between the bar's pixel span and its data span.
function makeCandleShape(color) {
  return function CandleShape(props) {
    const { x, y, width, height, payload } = props;
    const { o, h, l, c } = payload;
    const isUp = c >= o;
    const fill = isUp ? '#0F9D58' : '#E0483F';
    if (h === l) return null;
    const scaleY = (v) => y + (h - v) / (h - l) * height;
    const yOpen = scaleY(o);
    const yClose = scaleY(c);
    const yHigh = y;
    const yLow = y + height;
    const bodyTop = Math.min(yOpen, yClose);
    const bodyHeight = Math.max(Math.abs(yClose - yOpen), 1.5);
    const cx = x + width / 2;
    const bodyWidth = Math.max(width * 0.55, 4);

    return (
      <g>
        <line x1={cx} x2={cx} y1={yHigh} y2={yLow} stroke={fill} strokeWidth={1.5} />
        <rect x={cx - bodyWidth / 2} y={bodyTop} width={bodyWidth} height={bodyHeight} fill={fill} rx={1} />
      </g>
    );
  };
}

function CandleTooltip({ active, payload }) {
  if (!active || !payload || !payload.length) return null;
  const d = payload[0].payload;
  const isUp = d.c >= d.o;
  return (

      background: '#F2ECDC', border: '1px solid #D6CBAE', borderRadius: 6,
      padding: '8px 10px', fontFamily: 'JetBrains Mono, monospace', fontSize: 12.5,
    }}>
      <div style={{ color: '#8A7A5C', marginBottom: 3 }}>{d.d}</div>
      <div style={{ color: '#3A2E20' }}>開 {d.o.toLocaleString()}　收 {d.c.toLocaleString()}</div>
      <div style={{ color: isUp ? '#0F9D58' : '#E0483F' }}>高 {d.h.toLocaleString()}　低 {d.l.toLocaleString()}</div>
    </div>
  );
}

function CandlestickChart({ data, height = 140 }) {
  const chartData = data.map(d => ({ ...d, range: [d.l, d.h] }));
  const allLows = data.map(d => d.l);
  const allHighs = data.map(d => d.h);
  const minVal = Math.min(...allLows);
  const maxVal = Math.max(...allHighs);
  const pad = (maxVal - minVal) * 0.05 || maxVal * 0.01 || 1;
  const yDomain = [minVal - pad, maxVal + pad];
  // Aim for roughly 7-8 x-axis labels regardless of how many candles are shown
  // (52 weekly vs ~260 daily), so labels never overlap into unreadable clutter.
  const tickInterval = Math.max(0, Math.floor(chartData.length / 7) - 1);

  return (
    <div style={{ height }}>
      <ResponsiveContainer>
        <ComposedChart data={chartData} margin={{ top: 5, right: 10, left: -20, bottom: 0 }}>
          <XAxis dataKey="d" tick={{ fill: '#A89878', fontSize: 11 }} interval={tickInterval} />
          <YAxis domain={yDomain} tick={{ fill: '#A89878', fontSize: 12 }} />
          <Tooltip content={<CandleTooltip />} />
          <Bar dataKey="range" shape={makeCandleShape()} isAnimationActive={false} />
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  );
}

function PERuler({ range }) {
  const { low, high, median, current } = range;
  const pct = (v) => Math.min(100, Math.max(0, ((v - low) / (high - low)) * 100));
  return (
    <div style={{ marginTop: 4 }}>
      <div style={{ position: 'relative', height: 8, background: '#F2ECDC', borderRadius: 4, marginTop: 26, marginBottom: 10 }}>
        {/* median tick */}
        <div style={{
          position: 'absolute', left: `${pct(median)}%`, top: -5, width: 2, height: 18,
          background: '#8A7A5C', transform: 'translateX(-50%)',

        {/* current marker */}
        <div style={{
          position: 'absolute', left: `${pct(current)}%`, top: -16, transform: 'translateX(-50%)',

                    EPS 更新於 {tone.days} 天前{tone.days >= 75 ? '（建議請 Claude 更新）' : ''}
                  </div>
                );
              })()}
            </div>

            <button
              onClick={(e) => { e.stopPropagation(); setShowNotes(s => !s); }}
              style={{
                display: 'flex', alignItems: 'center', gap: 4, marginTop: 10,
                background: 'none', border: 'none', padding: 0, cursor: 'pointer',
                fontFamily: 'Inter, sans-serif', fontSize: 13.5, color: '#8A7A5C',
              }}
            >
              {showNotes ? <ChevronUp size={13} color="#8A7A5C" /> : <ChevronDown size={13} color="#8A7A5C" />}
              {showNotes ? '隱藏計算方式說明' : '顯示計算方式說明'}
            </button>

            {showNotes && (
              <div style={{ marginTop: 8, display: 'grid', gap: 8 }}>
                {data.epsTrailingNote && (
                  <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 13.5, color: '#8A7A5C', lineHeight: 1.5 }}>
                    Trailing EPS：{data.epsTrailingNote}
                  </div>
                )}
                {data.epsForwardNote && (
                  <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 13.5, color: '#8A7A5C', lineHeight: 1.5 }}>
                    預估EPS：{data.epsForwardNote}
                  </div>
                )}
                {targetPrice != null && (
                  <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 13.5, color: '#8A7A5C', lineHeight: 1.5 }}>
                    目標價：以「1 ÷ 聯邦基金有效利率（{fedRate.effective}%）」當作隱含合理本益比，乘上預估今年EPS計算而得，屬簡化的Fed Model估值法，非分析師目標價共識。
                  </div>
                )}
                <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 13.5, color: '#8A7A5C', lineHeight: 1.5 }}>
                  P/E 隨即時股價自動計算 · EPS 數字由 Claude 每季更新
                </div>
              </div>
            )}

            <div style={{ marginTop: 12 }}>
              <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 13, textTransform: 'uppercase', letterSpacing: 0.8, color: '#8A7A5C', marginBottom: 4 }}>
                歷史本益比區間定位
              </div>
              <PERuler range={{ ...data.peRange, current: computePE(data.level, data.epsTrailing) }} />
              {showNotes && data.peRangeNote && (
                <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 13.5, color: '#8A7A5C', lineHeight: 1.5, marginTop: 6 }}>
                  {data.peRangeNote}
                </div>
              )}
            </div>

            <a
              href={data.peChartUrl}
              target="_blank"
              rel="noopener noreferrer"
              onClick={(e) => e.stopPropagation()}
              style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                marginTop: 12, padding: '10px 12px', background: '#F2ECDC', borderRadius: 8,
                border: '1px solid #E8ECF0', textDecoration: 'none',
              }}
            >
              <span style={{ fontFamily: 'Inter, sans-serif', fontSize: 14.5, color: '#5C4A34' }}>
                查看完整逐日歷史 P/E 折線圖 ({data.peChartSource})
              </span>
              <span style={{ color: '#A89878', fontSize: 16 }}>↗</span>
            </a>

            {showNotes && data.note && (
              <div style={{ marginTop: 10, fontFamily: 'Inter, sans-serif', fontSize: 13.5, color: '#8A7A5C', lineHeight: 1.5 }}>
                註：{data.note}
              </div>
            )}
          </>
        ) : (
          <div style={{
            marginTop: 16, paddingTop: 16, borderTop: '1px solid #E8ECF0',
          }}>
            <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 13, textTransform: 'uppercase', letterSpacing: 0.8, color: '#8A7A5C', marginBottom: 6 }}>
              本益比資訊
            </div>
            <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 15, color: '#6B5A3E', lineHeight: 1.6 }}>
              {data.note}
            </div>
          </div>
        )}
      </div>

      {expanded && (
        <div style={{ padding: '0 16px 16px' }}>
          {data.description && (
            <div style={{
              fontFamily: 'Inter, sans-serif', fontSize: 14.5, color: '#5C4A34', lineHeight: 1.6,
              marginBottom: 16, paddingBottom: 16, borderTop: '1px solid #E8ECF0', paddingTop: 16,
            }}>
              {data.description}
            </div>
          )}

          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <LineChartIcon size={13} color="#8A7A5C" />
              <span style={{ fontFamily: 'Inter, sans-serif', fontSize: 13, textTransform: 'uppercase', letterSpacing: 0.8, color: '#8A7A5C' }}>
                一年走勢（{showDaily ? '日K線' : '週K線'}）
              </span>
            </div>
            <div style={{ display: 'flex', gap: 4 }}>
              <button
                onClick={() => setShowDaily(false)}
                style={{
                  fontFamily: 'Inter, sans-serif', fontSize: 12.5, padding: '4px 10px', borderRadius: 6,
                  border: '1px solid #E2D9C3', cursor: 'pointer',
                  background: !showDaily ? '#5C6B47' : 'transparent',
                  color: !showDaily ? '#FFFDF7' : '#8A7A5C',
                }}
              >
                週K
              </button>
              <button
                onClick={() => setShowDaily(true)}
                style={{
                  fontFamily: 'Inter, sans-serif', fontSize: 12.5, padding: '4px 10px', borderRadius: 6,
                  border: '1px solid #E2D9C3', cursor: 'pointer',
                  background: showDaily ? '#5C6B47' : 'transparent',
                  color: showDaily ? '#FFFDF7' : '#8A7A5C',
                }}
              >
                日K
              </button>
            </div>
          </div>
          <CandlestickChart data={showDaily ? (data.historyDaily || data.history) : data.history} height={200} />

          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontFamily: 'JetBrains Mono, monospace', fontSize: 13, color: timeAgoTone(data.lastUpdated).color, marginTop: 12 }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: timeAgoTone(data.lastUpdated).color, display: 'inline-block' }} />
            資料更新於 {fmtTimeAgo(data.lastUpdated)}
          </div>
        </div>
      )}
    </div>
  );
}

function PEHighlight({ label, value }) {
  return (
    <div style={{
      background: '#F2ECDC', borderRadius: 8, padding: '10px 12px',
      border: '1px solid #E2D9C3',
    }}>
      <div style={{ fontFamily: 'Inter, sans-serif', fontSize: 12, textTransform: 'uppercase', letterSpacing: 0.6, color: '#8A7A5C', marginBottom: 2 }}>
        {label}
      </div>
      <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 26, fontWeight: 700, color: '#5C6B47' }}>
        {value}
      </div>
    </div>
  );
}

function StatBold({ label, value }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', padding: '4px 0' }}>
      <span style={{ fontFamily: 'Inter, sans-serif', fontSize: 15, fontWeight: 700, color: '#3A2E20' }}>{label}</span>
      <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 17, fontWeight: 700, color: '#3A2E20' }}>
        {value}
      </span>
    </div>
  );
}

function Stat({ label, value, flag }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0' }}>
      <span style={{ fontFamily: 'Inter, sans-serif', fontSize: 14.5, color: '#8A7A5C' }}>{label}</span>
      <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 14.5, color: flag ? '#D89430' : '#3A2E20' }}>
        {value}{flag ? ` · ${flag === 'overbought' ? '超買' : '超賣'}` : ''}
      </span>
    </div>
  );
}

function StockDashboard() {
  const [tickers, setTickers] = useState(seedTickers);
  const [indexData, setIndexData] = useState(initialIndexList);
  const [inputVal, setInputVal] = useState('');
  const [workerMissing, setWorkerMissing] = useState(false);

  const applyLiveUpdate = (bySymbol) => {
    // Update indices — price/change only; P/E, forward EPS stay manual.
    setIndexData(prev => prev.map(idx => {
      const live = extractLiveFields(bySymbol[idx.yahooSymbol]);
      if (!live) return idx;
      return {
        ...idx,
        level: live.price ?? idx.level,
        change: live.change ?? idx.change,
        changePct: live.changePct ?? idx.changePct,
        lastUpdated: new Date().toISOString(),
      };
    }));

    // Update individual stocks — price/change only; fundamentals stay manual.
    setTickers(prev => {
      const next = { ...prev };
      for (const sym of Object.keys(next)) {
        const live = extractLiveFields(bySymbol[sym]);
        if (!live) continue;
        next[sym] = {
          ...next[sym],
          price: live.price ?? next[sym].price,
          change: live.change ?? next[sym].change,
          changePct: live.changePct ?? next[sym].changePct,
          lastUpdated: new Date().toISOString(),
        };
      }
      return next;
    });
  };

  // Auto-refresh live data for all indices + tracked stocks, once on load.
  useEffect(() => {
    if (!WORKER_URL || WORKER_URL === 'YOUR_CLOUDFLARE_WORKER_URL_HERE') {
      setWorkerMissing(true);
      return;
    }
    let cancelled = false;
    (async () => {
      const symbols = [
        ...initialIndexList.map(idx => idx.yahooSymbol),
        ...Object.keys(tickers),
      ];
      const bySymbol = await fetchYahooQuotes(symbols);
      if (cancelled || !bySymbol) return;
      applyLiveUpdate(bySymbol);
    })();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Replace the fabricated placeholder candlesticks with REAL historical
  // OHLC once, on load — one weekly-range and one daily-range fetch per
  // index/stock. Falls back to the built-in (fabricated) history on failure
  // so the chart never goes blank.
  useEffect(() => {
    if (!WORKER_URL || WORKER_URL === 'YOUR_CLOUDFLARE_WORKER_URL_HERE') return;
    let cancelled = false;
    (async () => {
      for (const idx of initialIndexList) {
        const [weekly, daily] = await Promise.all([
          fetchYahooHistory(idx.yahooSymbol, '1y', '1wk'),
          fetchYahooHistory(idx.yahooSymbol, '1y', '1d'),
        ]);
        if (cancelled) return;
        if (weekly || daily) {
          setIndexData(prev => prev.map(i => i.symbol === idx.symbol ? {
            ...i,
            history: weekly || i.history,
            historyDaily: daily || i.historyDaily,
          } : i));
        }
      }
      for (const sym of Object.keys(tickers)) {
        const [weekly, daily] = await Promise.all([
          fetchYahooHistory(sym, '1y', '1wk'),
          fetchYahooHistory(sym, '1y', '1d'),
        ]);
        if (cancelled) return;
        if (weekly || daily) {
          setTickers(prev => prev[sym] ? {
            ...prev,
            [sym]: {
              ...prev[sym],
              history: weekly || prev[sym].history,
              historyDaily: daily || prev[sym].historyDaily,
            },
          } : prev);
        }
      }
    })();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const addTicker = () => {
    const sym = inputVal.trim().toUpperCase();
    if (!sym || tickers[sym]) { setInputVal(''); return; }
    setTickers(prev => ({
      ...prev,
      [sym]: {
        name: '（尚未更新 — 請貼上最新資料）',
        price: 0, change: 0, changePct: 0,
        lastUpdated: new Date(Date.now() - 999 * 36e5).toISOString(),
        fundamentals: { pe: '—', peForward: '—', marketCap: '—', eps: '—', epsForward: '—' },
        technicals: { ma50: '—', ma200: '—', rsi: '—' },
        news: [{ headline: '尚無資料，請向 Claude 要求搜尋最新資訊', source: '' }],
        history: [{ d: '—', o: 0, h: 0, l: 0, c: 0 }],
      }
    }));
    setInputVal('');
    if (WORKER_URL && WORKER_URL !== 'YOUR_CLOUDFLARE_WORKER_URL_HERE') {
      fetchYahooQuotes([sym]).then(bySymbol => {
        if (!bySymbol) return;
        applyLiveUpdate(bySymbol);
      });
      Promise.all([
        fetchYahooHistory(sym, '1y', '1wk'),
        fetchYahooHistory(sym, '1y', '1d'),
      ]).then(([weekly, daily]) => {
        if (!weekly && !daily) return;
        setTickers(prev => prev[sym] ? {
          ...prev,
          [sym]: {
            ...prev[sym],
            history: weekly || prev[sym].history,
            historyDaily: daily || prev[sym].historyDaily,
          },
        } : prev);
      });
    }
  };

  const removeTicker = (sym) => {
    setTickers(prev => {
      const next = { ...prev };
      delete next[sym];
      return next;
    });
  };

  const overallStale = useMemo(() => {
    const all = Object.values(tickers);
    if (!all.length) return null;
    const oldest = Math.max(...all.map(t => Date.now() - new Date(t.lastUpdated).getTime()));
    return oldest / 36e5;
  }, [tickers]);

  return (
    <div style={{
      minHeight: '100vh',
      background: '#FAF6EC',
      padding: '24px 16px 60px',
      fontFamily: 'Inter, sans-serif',
    }}>
      <div style={{ maxWidth: 640, margin: '0 auto' }}>
        {/* Header */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between' }}>
            <h1 style={{
              fontFamily: 'JetBrains Mono, monospace', fontWeight: 700, fontSize: 25,
              color: '#3A2E20', margin: 0, letterSpacing: -0.5,
            }}>
              持股追蹤台
            </h1>
            {overallStale !== null && (
              <div style={{
                display: 'flex', alignItems: 'center', gap: 6,
                fontFamily: 'JetBrains Mono, monospace', fontSize: 13,
                color: overallStale > 24 ? '#E0483F' : overallStale > 6 ? '#D89430' : '#0F9D58',
              }}>
                <RefreshCw size={11} />
                最舊資料 {Math.floor(overallStale)}h 前
              </div>
            )}
          </div>
          <p style={{ fontFamily: 'Inter, sans-serif', fontSize: 15, color: '#6B5A3E', marginTop: 4 }}>
            {workerMissing
              ? '尚未連接即時資料 · 請在程式碼中設定 WORKER_URL'
              : '大盤指數與個股股價每次開啟自動更新（來源Yahoo Finance） · P/E、EPS等進階數據請 Claude 手動更新'}
          </p>
        </div>

        {/* Fed rate */}
        <FedRateBanner data={fedRate} />

        {/* Index overview */}
        <div style={{ display: 'grid', gap: 0, marginBottom: 20 }}>
          {indexData.map((idx) => (
            <IndexPanel key={idx.symbol} data={idx} />
          ))}
        </div>

        {/* Add ticker */}
        <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
          <input
            value={inputVal}
            onChange={e => setInputVal(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addTicker()}
            placeholder="輸入代號，例如 TSLA"
            style={{
              flex: 1, background: '#FFFDF7', border: '1px solid #E8ECF0', borderRadius: 8,
              padding: '10px 12px', color: '#3A2E20', fontFamily: 'JetBrains Mono, monospace',
              fontSize: 15, outline: 'none',
            }}
          />
          <button
            onClick={addTicker}
            style={{
              display: 'flex', alignItems: 'center', gap: 6,
              background: '#5C6B47', border: '1px solid #5C6B47', borderRadius: 8,
              padding: '10px 14px', color: '#FFFDF7', cursor: 'pointer',
              fontFamily: 'Inter, sans-serif', fontSize: 15, fontWeight: 500,
            }}
          >
            <Plus size={14} /> 新增
          </button>
        </div>

        {/* Cards */}
        <div style={{ display: 'grid', gap: 10 }}>
          {Object.keys(tickers).length === 0 && (
            <div style={{ textAlign: 'center', padding: '40px 0', color: '#6B5A3E', fontFamily: 'Inter, sans-serif', fontSize: 15 }}>
              尚未追蹤任何股票，輸入代號開始追蹤
            </div>
          )}
          {Object.entries(tickers).map(([symbol, data]) => (
            <TickerCard key={symbol} symbol={symbol} data={data} onRemove={removeTicker} />
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(StockDashboard));
</script>
</body>
</html>
